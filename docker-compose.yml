version: "3.8"

services:
  expo-dev:
    build:
      context: .
      target: dev
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - EXPO_DEVTOOLS_LISTEN_ADDRESS=0.0.0.0
      - REACT_NATIVE_PACKAGER_HOSTNAME=${REACT_NATIVE_PACKAGER_HOSTNAME:-localhost}
    stdin_open: true
    tty: true

  expo-web:
    build:
      context: .
      target: web
    ports:
      - "80:80"
