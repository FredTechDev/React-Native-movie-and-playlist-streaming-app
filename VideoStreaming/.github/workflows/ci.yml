name: Netstream Continuous Integration & Deployment

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  audit-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

      - name: Compile & Type Check
        run: npx tsc --noEmit

      - name: Run Unit Tests
        run: npm test

  build-and-deploy:
    needs: audit-and-validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Setup Expo Credentials
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build Android Release Package (AAB)
        run: eas build --platform android --profile production --non-interactive

      - name: Build iOS Release Package (IPA)
        run: eas build --platform ios --profile production --non-interactive

      - name: Release Over-The-Air Update (OTA)
        run: eas update --branch main --message "OTA CI Release updates"
